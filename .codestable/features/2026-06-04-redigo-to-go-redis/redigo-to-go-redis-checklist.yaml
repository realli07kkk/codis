steps:
  - action: "安全微重构：新增 pkg/utils/redis/reply.go 承载 reply conversion helpers，不改变现有 redigo 调用行为"
    exit_signal: "pkg/utils/redis 编译/测试仍通过；新增 helper 文件不被上层直接依赖"
    status: done
  - action: "版本与触点复核：重新执行 go-redis latest/versions/download 查询，并 grep Go 源码 redigo 使用点"
    exit_signal: "目标版本仍是正式 tagged v9.20.0 或已记录变更并暂停；Go 源码触点清单完整"
    status: done
  - action: "核心 client handle 迁移：把 pkg/utils/redis.Client 底层从 redigo 替换为 go-redis dedicated Conn"
    exit_signal: "pkg/utils/redis 编译通过；上层调用签名不变；构造失败、AUTH、SELECT 测试可描述"
    status: done
  - action: "reply conversion 与 pipeline 迁移：实现 reply helpers 和 Send/Flush/Receive wrapper，替换 redigo conversion 调用"
    exit_signal: "InfoFull、SetMaster、SlotsInfo、sync/async migration、Role 的 shape 校验保持；pipeline send/recv 计数仍可驱动 recycle"
    status: done
  - action: "Sentinel 路径迁移：改造 subscribe、masters/slaves、monitor/remove/flushconfig 的 go-redis 调用路径"
    exit_signal: "Sentinel subscribe ack、+switch-master message、masters/slaves string map、monitor/remove pipeline 语义都有测试或现有 topom gate 覆盖"
    status: done
  - action: "deprecated extern 清理：清除 extern/deprecated/redis-test redigo imports"
    exit_signal: "该目录 Go 源码不再 import redigo；不引入该目录为默认验收 gate，不修无关历史问题"
    status: done
  - action: "module manifest 收口：执行定点 go get github.com/redis/go-redis/v9@v9.20.0，删除 redigo direct require 并核对 go.sum"
    exit_signal: "go.mod 只有预期 module 切换及必要 indirect 变化；go.sum 不保留 redigo 作为当前可达依赖；不运行无目标全量 tidy"
    status: done
  - action: "测试闭环：运行 pkg/utils/redis、pkg/topom 和默认 cmd/pkg 测试"
    exit_signal: "go test ./pkg/utils/redis、go test ./pkg/topom、go test ./cmd/... ./pkg/... 通过"
    status: done
  - action: "范围守护：grep 和 git diff 收口"
    exit_signal: "rg github.com/garyburd/redigo --glob '*.go' 无命中；diff 不包含 Redis Server、proxy RESP codec、Docker、部署、前端或无关依赖升级"
    status: done

