    exit_signal: "五个 module 的 @latest 仍等于当前版本；github.com/modern-go/concurrent 无 tagged Versions 列表但 @latest 为当前 pseudo version；如变化则记录实际结果并暂停确认"
    status: done
  - action: "依赖触达和策略分类：执行 go mod why、go list -deps 并复核 pkg/models/etcd import surface"
    exit_signal: "五个 module 均经 pkg/models/etcd -> github.com/coreos/etcd/client 或其子依赖触达；策略均为 retain-with-note"
    status: done
  - action: "module manifest 保留确认：不执行升级型 go get，核对 git diff -- go.mod go.sum"
    exit_signal: "go.mod/go.sum 对本 feature 保持零 diff；go 1.26.1 和 jemalloc-go replace 保留"
    status: done
  - action: "coordinator target 测试：运行 go test ./pkg/models/etcd ./pkg/models ./cmd/dashboard ./cmd/proxy ./cmd/admin ./cmd/fe"
    exit_signal: "etcd client 包、models 工厂和使用 coordinator 参数的 cmd 入口均编译测试通过"
    status: done
  - action: "默认构建测试闭环：运行 go test ./cmd/... ./pkg/..."
    exit_signal: "默认 cmd/pkg 测试通过，不报 module version、vendor mode 或 API 不兼容错误"
    status: done
  - action: "范围守护与临时产物清理：核对最终 diff、vendor/Godeps 和 roadmap 文档状态"
    exit_signal: "diff 仅包含本 feature spec 和 roadmap 状态；无 Go 源码、配置、部署、extern、vendor/Godeps 或无关 module churn"
    status: done

