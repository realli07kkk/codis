  - item: "SLOTSMGRT-EXEC-WRAPPER 的 [0,err]、[1,err]、[2,reply] 三种返回码都按现有 proxy 语义处理"
    source: 编排骨架
    status: passed
  - item: "本 feature 不引入新配置 key、HTTP endpoint、Redis 命令、定时任务、coordinator schema 或 proxy allow-list 条目"
    source: 挂载点
    status: passed
  - item: "Redis 8 default-user requirepass 下 NewClient/proxy backend AUTH 成功，错误密码返回错误且不泄露密码"
