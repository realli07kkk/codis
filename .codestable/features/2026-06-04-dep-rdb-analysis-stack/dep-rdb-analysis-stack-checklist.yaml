    status: done
  - action: "范围守护与临时产物清理：核对最终 diff、vendor/Godeps 和 roadmap 文档状态"
    exit_signal: "diff 仅包含本 feature spec 和 roadmap 状态；无 Go 源码、配置、部署、extern、vendor/Godeps 或 module churn"
    status: done

