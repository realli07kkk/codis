feature: 2026-05-12-legacy-vendor-retirement
created: 2026-05-12

steps:
  - action: "旧依赖目录退休：删除 tracked vendor/ 与 Godeps/"
    exit_signal: "test ! -d vendor && test ! -d Godeps 成功，git status --short 显示这两个目录只作为预期删除"
    status: done
  - action: "module manifest 收口：把 go.mod 从临时 go 1.13 改为 go 1.26.1，并移除 vendor 过渡注释和冗余 toolchain 行"
    exit_signal: "go.mod 无 go 1.13、Temporary: keep go < 1.14、toolchain go1.26.1 命中，jemalloc-go replace 保留"
    status: done
  - action: "module graph 验证：确认依赖解析不走旧 vendor，jemalloc replace 仍正确"
    exit_signal: "GO111MODULE=on go list -m -json github.com/spinlock/jemalloc-go 的 Replace.Dir 指向 third_party/jemalloc-go，且没有 vendor/modules.txt"
    status: done
  - action: "构建测试回归：跑默认 cmd/pkg 测试、cgo_jemalloc proxy 构建和 Makefile 测试入口"
    exit_signal: "GO111MODULE=on go test ./cmd/... ./pkg/...、GO111MODULE=on go build -tags cgo_jemalloc -o /tmp/codis-proxy-cgo-test ./cmd/proxy、make gotest 均通过"
    status: done
  - action: "范围守护：确认没有顺手改运行代码、部署脚本、第三方本地 jemalloc 或依赖版本"
    exit_signal: "diff 仅包含 vendor/、Godeps/ 删除、go.mod 收口，以及本 feature/roadmap 状态文件"
    status: done

