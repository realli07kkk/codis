feature: 2026-05-19-rdb-analysis-dashboard
created: 2026-05-19

steps:
  - action: "后端 API 骨架：在 dashboard 下接入 rdb-analysis 路由和 job 状态机，先用 fake job 返回 queued/running/done"
    exit_signal: "FE 或 curl 可创建 job、查询 job、取消 job，xauth 错误会被拒绝"
    status: done
  - action: "RDB 流式解析与聚合：使用 rdb/core、rdb/model 解析本地测试 RDB，生成 progress、summary 和 top N"
    exit_signal: "用 rdb cases fixture 可得到稳定的 key count、type summary、big key 列表"
    status: done
  - action: "安全输入与配置：接入上传/受控 path 输入、workspace、大小限制、并发限制和任务清理"
    exit_signal: "非法路径、超大文件、超过并发都返回明确 API error；合法上传能启动任务"
    status: done
  - action: "FE 静态结构：在现有 dashboard 页面加入 RDB Analysis 区域，能选择输入、设置参数、显示任务状态"
    exit_signal: "选中 product 后页面出现分析入口；未选 product 或参数非法时按钮禁用"
    status: done
  - action: "FE 轮询与展示：接通任务创建、轮询、取消、错误展示和结果表格/图形"
    exit_signal: "运行中任务能周期性刷新 progress，完成后停止轮询并展示最终结果"
    status: done
  - action: "依赖与文档收口：最小更新 go.mod/go.sum、dashboard 默认配置和用户说明"
    exit_signal: "不含本机绝对 replace；配置模板说明默认限制；文档说明首版不自动抓远端 Redis RDB"
    status: done
  - action: "验证覆盖：补齐后端单测、API 状态机测试和 FE 手工验收路径"
    exit_signal: "go test ./pkg/topom -run RDBAnalysis 与 make gotest 可通过；本地 FE 能完成一次小 RDB 上传分析"
    status: done

