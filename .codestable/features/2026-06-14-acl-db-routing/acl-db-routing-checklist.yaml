feature: 2026-06-14-acl-db-routing
created: 2026-06-14

steps:
  - action: "名词层：models.ACLUser 加 DB *int（nil=未绑定），NewACLSnapshot deep copy 带上 DB"
    exit_signal: "含/不含 db 的 ACL 均能 encode/decode；无 db 字段的旧 JSON 解码后 DB=nil"
    status: done
  - action: "proxy 强制：SessionACLIdentity 加 ForcedDB；handleACLAuth 解析绑定 db（越界 fail-closed）；handleSelect 对绑定会话返回 OK 但不改 db"
    exit_signal: "绑定用户命令落绑定 db、SELECT 回 OK 不改路由；unbound 用户 SELECT/路由行为不变"
    status: done
  - action: "控制面：topom ACLUserUpdate/ACLUserView/buildACLUser 支持 db（校验 db≥0、回显、不渲染进 ACL SETUSER）；admin redactACLUpdateRequest 保留 db"
    exit_signal: "提交带 db 的用户后 GET ACL view 回显 db，且后端收到的 ACL SETUSER 不含任何 db token"
    status: done
  - action: "FE：acl.js + index.html 加 per-user db 输入与展示"
    exit_signal: "FE ACL 面板能配置和查看绑定 db"
    status: done
  - action: "验收覆盖：补齐正常、SELECT 忽略、unbound 不变、越界 fail-closed、revision 切换重认证、存量解码场景"
    exit_signal: "目标 proxy/topom/models package 测试通过"
    status: done

