feature: 2026-05-13-redis8-slot-index-and-tag-index-core
created: 2026-05-13

steps:
  - action: "tag/hash helper：补齐返回 slot、完整 CRC32、has_tag 的 Codis hash 信息接口"
    exit_signal: "SLOTSHASHKEY 结果不变，空 tag 和普通 key 的 helper 结果符合 foundation 测试"
    status: done

  - action: "tag index 状态管理：在 DB init、temp DB、empty、swap、lazyfree 路径接入 codis_tagged_keys 创建、清空、交换和释放"
    exit_signal: "Codis mode 下空 DB、FLUSHDB、FLUSHALL、async flush 后 DEBUG tag assert 均为 OK"
    status: done

  - action: "运行期 key 生命周期 hook：在新增和删除主路径维护 tag index，并确认 overwrite 同名 key 不产生重复节点"
    exit_signal: "SET、DEL、UNLINK、RENAME、MOVE、COPY、overwrite、expire、evict 后 tag assert 均为 OK"
    status: done

  - action: "full-load rebuild：RDB load 和 replica full sync temp DB 载入完成后从 kvstore 重建 tag index"
    exit_signal: "DEBUG RELOAD 或等价 RDB reload 后，tag assert 对带 tag 和不带 tag key 都通过"
    status: done

  - action: "slot keyspace helper 收口：把 SLOTSINFO 和后续命令需要的 per-slot count/dict 访问沉到 helper"
    exit_signal: "SLOTSINFO 现有 Tcl 场景全部通过，diff 中没有新增 hash_slots"
    status: done

  - action: "Tcl 覆盖与范围回归：扩展 tests/unit/codis.tcl 覆盖 tag index 正常、边界、错误和 full-load 场景"
    exit_signal: "./runtest --single unit/codis 通过，且测试不依赖后续 SLOTSSCAN/SLOTSDEL/SLOTSCHECK"
    status: done

  - action: "构建与反向核对：运行 Redis 8 构建，grep 范围守护项"
    exit_signal: "make codis-server-redis8 通过，diff 不包含 Go 代码、默认构建切换、Redis Cluster 协议行为或 Redis 3 hash_slots 平行索引"
    status: done

