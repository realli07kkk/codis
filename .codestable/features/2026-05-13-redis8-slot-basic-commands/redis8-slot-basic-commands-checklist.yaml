feature: 2026-05-13-redis8-slot-basic-commands
created: 2026-05-13

steps:
  - action: "命令注册骨架：补齐新增基础 slot 命令的 command JSON、命令表生成产物和函数声明，命令体先返回明确占位错误"
    exit_signal: "make codis-server-redis8 能编译，COMMAND INFO 可发现 SLOTSSCAN/SLOTSDEL/SLOTSCHECK"
    status: done

  - action: "read-only 命令收口：校正 SLOTSHASHKEY/SLOTSINFO 边界，并实现 SLOTSSCAN 的 slot、cursor、COUNT 解析和 per-slot scan"
    exit_signal: "hash/tag、SLOTSINFO 范围截断、SLOTSSCAN 空 slot/非空 slot/COUNT 用例通过"
    status: done

  - action: "write 命令删除路径：实现 SLOTSDEL 的全量参数预校验、slot key 快照收集、正常删除路径调用和剩余 count 返回"
    exit_signal: "单 slot、多 slot、重复 slot、跨 DB 删除场景通过，删除后 tag assert 仍为 OK"
    status: done

  - action: "一致性检查命令：实现 SLOTSCHECK 的 per-slot hash 校验和 tag index 校验"
    exit_signal: "正常 keyspace 返回 OK；codis mode disabled、错误 arity 和可构造的内部不一致场景返回 Redis error reply"
    status: done

  - action: "Tcl 覆盖与协议回归：扩展 tests/unit/codis.tcl，覆盖正常、边界、错误和当前 DB 语义"
    exit_signal: "./runtest --single unit/codis 通过，返回结构与 Redis 3 Codis 文档一致"
    status: done

  - action: "范围守护与构建回归：运行构建并 grep 禁止项"
    exit_signal: "make codis-server-redis8 通过；diff 不包含 hash_slots、迁移命令、Go 代码、Redis Cluster 协议行为或默认构建切换"
    status: done

