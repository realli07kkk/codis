feature: 2026-05-12-proxy-client-list
created: 2026-05-13

steps:
  - action: "命令入口骨架：让 CLIENT 顶层命令进入本地分支，CLIENT LIST 先返回空 bulk string，其他子命令返回不支持错误"
    exit_signal: "CLIENT LIST 不再触发 command 'CLIENT' is not allowed，也不会转发到 backend"
    status: done
  - action: "session registry：建立进程内 session id、注册/注销和快照能力"
    exit_signal: "并发创建/关闭 session 后，registry 中活动数量与 SessionsAlive() 一致"
    status: done
  - action: "CLIENT LIST 语义：实现无参数、TYPE、ID 三类 Redis 8.6.3 兼容解析路径"
    exit_signal: "正常过滤、未知 TYPE、无效 ID、错误参数数量都有确定响应"
    status: done
  - action: "字段格式化：按 Redis key=value 行格式输出 Codis 可证明字段子集"
    exit_signal: "输出每行包含 id/addr/laddr/age/idle/flags/db/cmd/user 等核心字段，行尾以 \\n 分隔，值不包含空格"
    status: done
  - action: "文档与兼容边界：更新 unsupported command 文档，把 CLIENT 调整为仅 CLIENT LIST 支持，其余子命令不支持"
    exit_signal: "doc/unsupported_cmds.md 不再宣称整个 CLIENT 都不可用"
    status: done
  - action: "验证覆盖：补齐 proxy package 单测和必要的端到端连接测试"
    exit_signal: "目标测试覆盖命令解析、鉴权、输出格式、过滤和 registry 生命周期"
    status: done

