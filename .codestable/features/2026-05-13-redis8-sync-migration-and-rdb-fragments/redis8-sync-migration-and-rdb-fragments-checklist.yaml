    exit_signal: "两个 Redis 8 实例之间 SLOTSMGRTONE 能成功迁移一个 key，源端 key 被删除，目标端 key 可读且值一致"
    status: done

  - action: "计算节点 tag 感知 + slot 随机：实现 slotsmgrttag_command（查询 codis_tagged_keys 找同 CRC key）+ slotsmgrtslotCommand + slotsmgrttagslotCommand + slotsmgrttagoneCommand，使用 kvstoreGetDict 访问 slot dict"
    exit_signal: "SLOTSMGRTTAGONE 迁移含 {tag} 的 key 时连带同 tag key 一起迁移；SLOTSMGRTTAGSLOT 返回 [migrated_count, remaining_count]；空 slot 返回 [0, 0]"
    status: done

  - action: "测试覆盖：补齐 Tcl 测试覆盖正常路径（各类型 key 迁移、tag 迁移、多 key SLOTSRESTORE）、边界（空 slot、不存在 key、超时、TTL 保持）和错误路径（目标不可达、密码错误、无效 payload），并覆盖源端删除向 replication stream 传播为 DEL，确保已有 codis.tcl 无回归"
    exit_signal: "所有 Tcl 测试通过，make codis-server-redis8 无误，手动验证迁移往返数据一致"
    status: done

