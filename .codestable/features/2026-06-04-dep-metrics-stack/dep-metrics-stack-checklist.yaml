feature: 2026-06-04-dep-metrics-stack
created: 2026-06-04

steps:
  - action: "版本调查复核：重新执行 go list 查询 InfluxDB 和 StatsD 的 current/latest"
    exit_signal: "InfluxDB 目标仍是 v1.12.4；StatsD 仍是 v2.0.0 且无 Update"
    status: done
  - action: "依赖触达分类：执行 go mod why 与 go list -deps 并复核 proxy metrics import surface"
    exit_signal: "InfluxDB 和 StatsD 都经 pkg/proxy 被默认 cmd/pkg 路径触达"
    status: done
  - action: "module manifest 定点升级：执行 GOPROXY=https://proxy.golang.org,direct go get github.com/influxdata/influxdb@v1.12.4"
    exit_signal: "go.mod 将 InfluxDB 改到 v1.12.4；StatsD、Go directive、jemalloc replace 保留"
    status: done
  - action: "checksum 与依赖图收口：核对 go.mod/go.sum、module graph 和导入路径"
    exit_signal: "新增 indirect/checksum 可追溯到 influxdb@v1.12.4；没有不相关 direct module 升级"
    status: done
  - action: "Metrics target 测试：运行 go test ./pkg/proxy ./cmd/proxy ./cmd/dashboard ./cmd/admin ./cmd/fe"
    exit_signal: "proxy metrics 包和相关 cmd 入口编译测试通过"
    status: done
  - action: "默认构建测试闭环：运行 go test ./cmd/... ./pkg/..."
    exit_signal: "默认 cmd/pkg 测试通过，不报 module version、vendor mode 或 InfluxDB client API 不兼容错误"
    status: done
  - action: "范围守护与临时产物清理：核对最终 diff、vendor/Godeps 和 roadmap 文档状态"
    exit_signal: "diff 仅包含 go.mod、go.sum、本 feature spec 和 roadmap 状态；无 Go 源码、配置、部署、extern、vendor/Godeps 或方案外 module churn"
    status: done

