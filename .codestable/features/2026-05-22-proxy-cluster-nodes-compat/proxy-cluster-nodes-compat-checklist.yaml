feature: 2026-05-22-proxy-cluster-nodes-compat
created: 2026-05-22

steps:
  - action: "配置与命令入口骨架：接入默认关闭配置，放开 CLUSTER 进入本地分支，disabled 保持不允许，self/all 下只有 NODES 有成功路径"
    exit_signal: "默认配置下 CLUSTER NODES 仍不可用；self 模式可返回 stub 节点文本；其他 CLUSTER 子命令不会转发到 backend"
    status: done
  - action: "节点格式化与 self 模式：实现 fake node id、address/bus-port 格式、myself,master flags 和 0-16383 输出"
    exit_signal: "单 proxy 输出符合 Redis Cluster CLUSTER NODES 文本字段数量和 slot range 要求"
    status: done
  - action: "all 模式存储轮询：复用 Jodis/coordinator 配置读取 proxy 注册列表，解析 online proxy，生成原子快照"
    exit_signal: "模拟多个 Jodis 节点时，快照包含所有 online proxy，删除或新增节点后一个 refresh period 内更新"
    status: done
  - action: "slot 均分与容错：按稳定排序均分 0-16383，处理空列表、坏 JSON、存储失败和地址异常"
    exit_signal: "任意 N > 0 的节点列表都无 gap/overlap 覆盖 0-16383；存储失败保留 last good snapshot"
    status: done
  - action: "文档与兼容边界：更新 unsupported command / proxy 配置说明，明确 CLUSTER NODES 是有限兼容"
    exit_signal: "文档不再把整个 CLUSTER 命令笼统描述为只能失败，同时明确其他 CLUSTER 子命令仍不支持"
    status: done
  - action: "验证覆盖：补齐 proxy package 单测和必要的 models/Jodis 轮询测试"
    exit_signal: "配置校验、命令解析、输出格式、slot 均分、轮询刷新和故障 fallback 都有可重复测试证据"
    status: done

