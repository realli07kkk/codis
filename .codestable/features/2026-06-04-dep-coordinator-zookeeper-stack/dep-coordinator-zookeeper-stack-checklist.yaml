    status: done
  - action: "依赖触达和策略分类：执行 go mod why、go list -deps 并复核 pkg/models/zk import surface"
    exit_signal: "go-zookeeper 经 pkg/models/zk -> github.com/samuel/go-zookeeper/zk 被默认 cmd/pkg 路径触达"
    status: done
  - action: "module manifest 定点升级：执行 GOPROXY=https://proxy.golang.org,direct go get github.com/samuel/go-zookeeper@v0.0.0-20201211165307-7117e9ea2414"
    exit_signal: "go.mod 只把 github.com/samuel/go-zookeeper 改到目标版本；go 1.26.1 和 jemalloc-go replace 保留"
    status: done
  - action: "checksum 与依赖图收口：核对 go.sum、module graph 和导入路径"
    exit_signal: "go.sum 只新增目标 pseudo version的 content/go.mod checksum；没有无关 module churn；import path 未迁移"
    status: done
  - action: "coordinator target 测试：运行 go test ./pkg/models/zk ./pkg/models ./cmd/dashboard ./cmd/proxy ./cmd/admin ./cmd/fe"
    exit_signal: "Zookeeper client 包、models 工厂和使用 coordinator/Jodis 参数的 cmd 入口均编译测试通过"
    status: done
  - action: "默认构建测试闭环：运行 go test ./cmd/... ./pkg/..."
    exit_signal: "默认 cmd/pkg 测试通过，不报 module version、vendor mode 或 API 不兼容错误"
    status: done
  - action: "范围守护与临时产物清理：核对最终 diff、vendor/Godeps 和 roadmap 文档状态"
    exit_signal: "diff 仅包含 go.mod、go.sum、本 feature spec 和 roadmap 状态；无 Go 源码、配置、部署、extern、vendor/Godeps 或无关 module churn"
    status: done

