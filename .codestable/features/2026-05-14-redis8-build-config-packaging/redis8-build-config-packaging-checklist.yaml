steps:
  - action: "metadata 审计骨架：列出全部 Codis command JSON 和对应 COMMAND INFO 验证点"
    exit_signal: "每个 Codis 命令都有 JSON 源，commands.def 可由生成器同步，审计能指出是否需要 metadata 修正"
    status: done
  - action: "默认构建切换：把 make codis-server / make build-all 的默认 server 产物切到 Redis 8，并保留 Redis 3 fallback"
    exit_signal: "bin/codis-server --version 是 Redis 8.6.3，fallback 目标仍能构建 Redis 3.2.11"
    status: done
  - action: "配置模板提升：将 tracked 默认 Redis 配置提升为 Redis 8 Codis Server 模板"
    exit_signal: "用 config/redis.conf 启动后 codis-enabled=yes、cluster-enabled=no，CONFIG REWRITE 不丢 Codis 自定义配置"
    status: done
  - action: "包装入口适配：更新 Dockerfile、docker server 脚本、example server 临时配置和 Kubernetes server manifest 的必要启动参数"
    exit_signal: "所有入口都使用默认 codis-server，且不会以 codis-enabled no 启动 Redis 8"
    status: done
  - action: "构建与 smoke 验证：跑默认构建、Redis 8 Tcl smoke、Go 组件兼容测试或目标包回归"
    exit_signal: "make build-all / make codis-server / Redis 8 Codis smoke 通过；Go 侧未出现生产 adapter 回归"
    status: done
  - action: "范围回归与交接：核对未混入 cutover、迁移协议、Go 依赖升级和 proxy 命令面变更"
    exit_signal: "diff 只包含 packaging / config / metadata 必要范围，validation-cutover 能接收正式发布物继续端到端验证"
    status: done

