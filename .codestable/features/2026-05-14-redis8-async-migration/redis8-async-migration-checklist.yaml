feature: 2026-05-14-redis8-async-migration
created: 2026-05-14

steps:
  - action: "命令与状态骨架：注册全部 async command JSON、生成 commands.def，补 server.h async client typedef/client flags/命令声明和 per-DB async client 状态，命令体先返回明确占位错误"
    exit_signal: "make codis-server-redis8 编译通过，COMMAND INFO 可发现 SLOTSMGRT*-ASYNC、SLOTSRESTORE-ASYNC*、SLOTSMGRT-ASYNC-* 和 SLOTSMGRT-EXEC-WRAPPER"
    status: done

  - action: "cached client 生命周期：实现 create/reuse/release、client unlink、serverCron timeout、fence/cancel/status 基础状态机"
    exit_signal: "手动创建目标连接后 STATUS 能看到 host/port/lastuse，CANCEL 能释放状态，client close 不留下悬空 blocked client"
    status: done

  - action: "源端 iterator 与命令流生成：实现 explicit key、slot scan、tag-aware 扩展、dump-only 命令、maxbulks/maxbytes 限流和 Redis 8 kvobj 引用安全"
    exit_signal: "SLOTSMGRTONE-ASYNC-DUMP 和 SLOTSMGRTTAGONE-ASYNC-DUMP 生成可被目标端执行的 restore async 命令流，slot/tag 收集不出现 hash_slots"
    status: done

  - action: "目标端 restore async 与 AUTH/SELECT/ACK：实现 SLOTSRESTORE-ASYNC 子命令、AUTH、AUTH2、SELECT 和 ACK 错误语义，写入路径保持 Redis 8 metadata-safe"
    exit_signal: "目标端执行 string/object/list/hash/dict/zset restore async 后返回 ACK 0，TTL 和类型正确；错误 payload 返回 ACK 非 0 并关闭连接"
    status: done

  - action: "完成收口：所有 ACK 成功后删除源端 key 并传播 DEL，chunked old values 交给 Redis 8 lazyfree，SLOTSMGRT-EXEC-WRAPPER 按 key migration 状态阻断写命令"
    exit_signal: "异步迁移完整往返成功，replication stream 只看到 DEL，写 wrapper 在迁移中返回 being migrated，读命令可执行"
    status: done

  - action: "Tcl 覆盖与范围回归：新增 codis_async_migration.tcl，覆盖正常、边界、错误、取消、timeout、auth、SELECT、large object chunk 和反向 grep"
    exit_signal: "make codis-server-redis8、./runtest --single unit/codis_async_migration、unit/codis_migration、unit/codis_slotsrestore、unit/codis 均通过"
    status: done

