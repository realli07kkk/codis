steps:
  - action: "版本调查复核：重新执行 go list 查询 github.com/garyburd/redigo 的 current、latest、versions，并记录 deprecated path metadata"
    exit_signal: "旧路径目标仍是 tagged v1.6.4；deprecated note 被记录；如变化则记录实际结果并暂停确认"
    status: done
  - action: "依赖触达和迁移边界确认：执行 go mod why、go list -deps 并复核 direct import surface"
    exit_signal: "默认 cmd/pkg 仍触达 redigo；直接 import 仅在 pkg/utils/redis 和 extern/deprecated/redis-test；本条继续保留旧 import path，不迁移 gomodule/redigo"
    status: done
  - action: "module manifest 定点升级：执行 GOPROXY=https://proxy.golang.org,direct go get github.com/garyburd/redigo@v1.6.4"
    exit_signal: "go.mod 只把 github.com/garyburd/redigo 改到 v1.6.4；go 1.26.1 和 jemalloc-go replace 保留"
    status: done
  - action: "checksum 与依赖图收口：核对 go.sum、module graph 和导入路径"
    exit_signal: "go.sum 只新增 redigo v1.6.4 的 content/go.mod checksum；没有无关 module churn；import path 未迁移"
    status: done
  - action: "Redis client target 测试：运行 go test ./pkg/utils/redis"
    exit_signal: "连接、AUTH、SELECT、INFO/CONFIG、SetMaster、SLOTSINFO、sync/async migration 和 auth identity 相关测试通过"
    status: done
  - action: "Topom 集成路径测试：运行 go test ./pkg/topom"
    exit_signal: "topom stats、slot action、ACL/Sentinel script 配置相关 Redis client 调用路径通过"
    status: done
  - action: "默认构建测试闭环：运行 go test ./cmd/... ./pkg/..."
    exit_signal: "默认 cmd/pkg 测试通过，不报 module version、vendor mode 或 API 不兼容错误"
    status: done
  - action: "范围守护与临时产物清理：核对最终 diff 和仓库状态"
    exit_signal: "diff 仅包含 go.mod、go.sum、本 feature spec 和 roadmap item 状态；不出现 extern、vendor/Godeps、配置模板、部署脚本、前端资源或仓库内临时构建产物"
    status: done

