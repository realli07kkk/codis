feature: 2026-05-27-proxy-stream-commands
created: 2026-05-27

steps:
  - action: "Stream metadata 骨架：把 Stream 命令纳入显式命令属性，并建立 Stream 命令识别入口"
    exit_signal: "getOpInfo 对 Stream 命令返回稳定 upper-case opstr 和正确读写 flag；非 Stream 未知命令仍保持 FlagMayWrite fallback"
    status: done
  - action: "单 key 与容器命令 resolver：实现 X* key、XGROUP subcmd key、XINFO subcmd key 的 key 提取和错误返回"
    exit_signal: "XGROUP CREATE mystream 和 XINFO GROUPS mystream 都按 mystream 路由；未知或无 key subcommand 不转发后端"
    status: done
  - action: "XREAD / XREADGROUP 安全解析：解析 STREAMS 段，拒绝 BLOCK，校验 key/id 数量和 multi-stream hash key 一致性"
    exit_signal: "单 stream 非阻塞请求可路由；带 BLOCK 或跨 hash tag multi-stream 请求返回 Redis error；同 hash tag multi-stream 请求整条转发"
    status: done
  - action: "接入现有转发语义：让 Stream dispatch 复用 slot.forward、迁移包装、replica/master 选择和 hot key cache 失效计划"
    exit_signal: "Stream 读命令保持 read-only 路由语义，Stream 写命令保持 master-only 和写后失效语义；迁移 slot 上使用解析出的 hash key"
    status: done
  - action: "文档与测试覆盖：补齐 mapper/session/router 相关单测和 unsupported command 文档"
    exit_signal: "关键验收场景都有可重复测试或文档证据，目标包测试通过"
    status: done

checks:
  - item: "Stream 命令进入显式 metadata，不再依赖未知命令 fallback"
    source: 名词契约
    status: passed
  - item: "XADD 等单 key Stream 命令按第 1 参数提取 stream key，并按 Redis 8 metadata 设置读写属性"
    source: 名词契约
    status: passed
  - item: "XGROUP CREATE/SETID/DESTROY/CREATECONSUMER/DELCONSUMER 按第 2 参数提取 stream key"
    source: 名词契约
    status: passed
  - item: "XINFO STREAM/GROUPS/CONSUMERS 按第 2 参数提取 stream key"
    source: 名词契约
    status: passed
  - item: "XREAD / XREADGROUP 从 STREAMS 关键字后解析 key 列表，key 数必须等于后续 id 数"
    source: 名词契约
    status: passed
  - item: "Stream dispatch 分支位于 default backend dispatch 前，且只对显式 Stream 命令生效"
    source: 编排骨架
    status: passed
  - item: "Stream resolver 成功后复用现有 slot.forward、后端连接池、pipeline 写回和迁移包装逻辑"
    source: 编排骨架
    status: passed
  - item: "参数不足、STREAMS 缺失、key/id 数量不匹配、未知 subcommand、BLOCK、跨 hash tag 都返回 Redis error，不关闭连接"
    source: 流程级约束
    status: passed
  - item: "所有放行的 multi-stream 请求必须共享同一 hash key，使迁移期 hkey 能代表整条命令涉及的 key group"
    source: 流程级约束
    status: passed
  - item: "只读 Stream 命令可按现有 replica 规则走 replica；写命令和 XREADGROUP 必须走 master"
    source: 流程级约束
    status: passed
  - item: "Stream 写命令按解析到的 stream key 触发现有写后失效；不为 Stream value 新增缓存能力"
    source: 流程级约束
    status: passed
