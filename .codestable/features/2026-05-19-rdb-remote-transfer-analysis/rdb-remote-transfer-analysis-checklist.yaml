feature: 2026-05-19-rdb-remote-transfer-analysis
created: 2026-06-02

steps:
  - action: "配置与 API 骨架：增加 remote fetch 配置、持久化 auth 校验、请求/响应类型、route、ApiClient 方法和 server allowlist stub"
    exit_signal: "remote fetch 默认关闭；开启但 auth 为空时配置校验失败；错误 xauth 被拒；不属于当前 product 的 server addr 被拒且无出站 HTTP"
    status: done

  - action: "remote HTTP 下载节点：实现 Redis export GET、禁止 redirect、status code 映射、timeout、size limit、临时文件 copy 和 cleanup"
    exit_signal: "fake HTTP export 200 可落临时文件；403/404/400、超限、超时和 client cancel 都返回明确错误并清理临时文件"
    status: done

  - action: "analysis job 衔接：把完整下载文件以 remote-http:<server>/<filename> source 交给现有 manager，复用 job get/cancel/remove/prune"
    exit_signal: "成功 remote fetch 返回 job id；轮询现有 API 能看到 running/done/error；删除 job 会删除 remote 临时文件"
    status: done

  - action: "codis-admin 入口：新增 CLI 参数、options 解析和 job id 输出"
    exit_signal: "codis-admin --dashboard ... --rdb-analysis-remote-fetch 能触发 dashboard API；CLI 不接收或打印 Redis export auth"
    status: done

  - action: "FE Remote 入口：新增 server addr 选择/输入、按钮状态、页面内错误展示和复用现有轮询"
    exit_signal: "FE 能从当前 product server 触发 remote fetch；成功后展示同一 job；失败时在 RDB Analysis 页面显示 dashboard 错误；FE 无 export auth 输入或存储"
    status: done

  - action: "验证覆盖：补 dashboard API/fake export 单测、admin 参数测试和 FE 静态交互检查"
    exit_signal: "go test ./pkg/topom -run RDB.*Remote、go test ./cmd/admin -run RDB.*Remote、make gotest 通过"
    status: done

  - action: "job id UUID v7 补充约束：RDBAnalysisManager.startJob 使用 github.com/google/uuid 的 uuid.NewV7() 生成 job id"
    exit_signal: "workspace/upload/remote fetch 创建的 job id 可解析为 UUID version 7；代码检索不到 uuid.NewString() 作为 job id 生成入口；go test ./pkg/topom -run RDBAnalysis 通过"
    status: done

  - action: "review hardening：收紧 remote fetch 内部边界、补下载阶段日志、补错误 xauth、invalid server_addr 和 remote fetch 并发上限测试"
    exit_signal: "manager 不再暴露接受裸 serverAddr 的 StartRemoteFetch；下载日志覆盖 start/status/bytes/duration/job id 且不打印 auth；go test ./pkg/topom -run RDB.*Remote 通过"
    status: done

