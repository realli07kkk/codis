feature: 2026-05-11-go-module-compile-baseline
created: 2026-05-11

steps:
  - action: "Module manifest 骨架：建立 go.mod，固定模块名和 Go 版本"
    exit_signal: "GO111MODULE=on go test ./cmd/... ./pkg/... 不再停在 does not contain main module"
    status: done
  - action: "Version metadata 兜底：让 clean checkout 下 utils.Version 和 utils.Compile 总是存在"
    exit_signal: "module mode 编译不再出现 undefined: utils.Version 或 undefined: utils.Compile"
    status: done
  - action: "依赖图收敛：按源码 import 和 Godeps baseline 生成 go.sum，并只做必要的最小依赖调整"
    exit_signal: "GO111MODULE=on go test ./cmd/... ./pkg/... 完成依赖下载、编译和测试"
    status: done
  - action: "范围守护：确认 jemalloc、Makefile、vendor 清理、Dockerfile 和部署脚本没有被顺手修改"
    exit_signal: "diff 中不存在范围外文件的行为性改动"
    status: done

