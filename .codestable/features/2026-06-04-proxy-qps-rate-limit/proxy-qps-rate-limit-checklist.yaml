feature: 2026-06-04-proxy-qps-rate-limit
created: 2026-06-04

steps:
  - action: "proxy limiter 骨架：新增默认关闭配置、校验、进程级 QPSLimiter 和 stats snapshot"
    exit_signal: "proxy_qps_limit=0 时请求行为保持现状；proxy_qps_limit>0 的 limiter 单测能稳定接受和拒绝请求"
    status: done
  - action: "请求入口接入：在 session reader 请求路径接入 limiter，保留 AUTH/QUIT bypass 和 pipeline 响应顺序"
    exit_signal: "普通命令超过阈值返回 ERR proxy qps limit exceeded；AUTH/QUIT 不被 QPS limit 阻断；pipeline 响应顺序保持"
    status: done
  - action: "proxy 动态应用接口：新增 proxy admin API、ApiClient 方法和运行期 SetQPSLimit"
    exit_signal: "HTTP PUT 可把 limit 从 0 改正数、从正数改 0、从高值调低，proxy stats 反映当前 revision 和 limit"
    status: done
  - action: "dashboard 管理源：新增 ProxyQPSLimit model/store/topom context、GET/PUT API、revision 和 sync status"
    exit_signal: "dashboard PUT 写入 coordinator revision；GET 返回 limit、revision、not_configured/ready/proxy_sync_failed 状态"
    status: done
  - action: "dashboard fan-out 与 reinit 重放：把当前 QPS limit 下发给 online proxy，并在 proxy online/reinit 时重放"
    exit_signal: "online proxy 收到新配置；部分 proxy 失败时 sync_status 记录失败 token；新 proxy reinit 后 stats 显示目标 limit"
    status: done
  - action: "FE 配置入口：新增 QPS limit editor，选择 product 后加载，提交后刷新"
    exit_signal: "FE 展示当前 limit/revision/sync_status，可提交非负整数，非法输入或 API 错误可见"
    status: done
  - action: "验证与文档：补齐 proxy/topom/FE 测试和运维说明"
    exit_signal: "目标 Go 测试通过；文档明确 per-proxy 语义、默认关闭、动态配置入口、CONFIG SET 边界和 rejected request 错误语义"
    status: done

