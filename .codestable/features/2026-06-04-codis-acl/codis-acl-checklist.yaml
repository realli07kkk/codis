    source: 验收场景
    status: passed
  - item: "topom/admin 提交 app_ro on #hash ~app:* +@read 后，所有 online Redis 8 server 收到等价 ACL SETUSER，所有 online proxy 安装同一 revision"
    source: 验收场景
    status: passed
  - item: "FE 选中 product 后，ACL 面板展示当前 enabled、revision、sync status 和用户列表"
    source: 验收场景
    status: passed
