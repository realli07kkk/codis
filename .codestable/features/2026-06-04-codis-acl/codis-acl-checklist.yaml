feature: 2026-06-04-codis-acl
created: 2026-06-04

steps:
  - action: "微重构：按 design 第 2.5 节拆出 proxy session auth、ACL runtime、topom ACL API 和 FE ACL controller 承载点"
    exit_signal: "旧 session_auth 行为测试保持不变，index.html 加载 acl.js 后 FE 页面仍能正常加载"
    status: done
  - action: "名词骨架：加入 models.ACL、Store ACL 路径、ACL 配置字段和结构化 Redis auth identity"
    exit_signal: "ACL 模型可 encode/decode，旧配置默认值和 product_auth/session_auth 行为不变"
    status: done
  - action: "控制面：实现 topom ACL API、codis-admin ACL 命令、FE ACL 页面和 Redis Server ACL SETUSER 同步编排"
    exit_signal: "提交一份 ACL 后，所有 fake Redis 或 Redis 8 节点收到期望 ACL SETUSER，FE 能展示新 revision"
    status: done
  - action: "Proxy 认证：实现 AUTH [username] password、ACL snapshot 安装、revision stale 和 brute-force guard 接入"
    exit_signal: "客户端能按多账号认证成功或失败，ACL 未启用时旧 AUTH 语义不变"
    status: done
  - action: "后端执行：拆分 service pool 与 user-bound pool，普通稳定命令走用户身份，内部命令走服务身份"
    exit_signal: "允许用户的命令由 backend 返回成功，未授权命令返回 NOPERM，迁移包装不要求业务用户有内部权限"
    status: done
  - action: "Redis 8 migration auth：补齐 Redis 8 Codis Server 同步/异步迁移 username/password 认证配置"
    exit_signal: "关闭 default user、只保留 backend service user 时，Redis 8 到 Redis 8 slot migration 成功"
    status: done
  - action: "验收覆盖：补齐正常、边界、失败、revision 切换和回滚场景"
    exit_signal: "目标 proxy/topom package 测试和 Redis 8 ACL smoke 通过"
    status: done

