feature: 2026-05-22-proxy-hot-key-cache
created: 2026-05-22

steps:
  - action: "配置与空缓存骨架：接入默认关闭的配置、校验和 HotKeyCache 空实现"
    exit_signal: "默认配置加载成功；关闭时 GET/MGET 行为和现状一致"
    status: done
  - action: "GET 命中/miss 编排：在 request path 接入单 key cache lookup、store 和直通回退"
    exit_signal: "配置 hot key 后，第一次 GET 访问 backend，第二次 TTL 内 GET 不访问 backend且响应相同"
    status: done
  - action: "MGET 局部命中编排：按 key 拆分命中/miss，复用现有 coalesce 保持顺序"
    exit_signal: "MGET 混合命中和 miss 时返回数组顺序正确，backend 只收到 miss key"
    status: done
  - action: "写失效与保守清理：覆盖 string 写、TTL 写、多 key 写和脚本/未知 may-write 的本地失效策略"
    exit_signal: "同 proxy 写入 hot key 后，下一次 GET 必须访问 backend 并返回新值或后端当前结果"
    status: done
  - action: "slot 变更与迁移边界：在 slot migrating/locked 时绕过 cache，FillSlot 后失效对应 slot"
    exit_signal: "迁移状态下 GET 不从旧 cache 返回；slot 映射更新后旧条目不可命中"
    status: done
  - action: "stats 与文档边界：补齐 proxy stats、配置注释和命令兼容说明"
    exit_signal: "stats JSON 能看到 cache enabled、entries、hits、misses、invalidations、evictions；文档明确弱一致边界"
    status: done
  - action: "验证覆盖：补齐 proxy package 单测和必要的 fake backend 计数测试"
    exit_signal: "关闭开关、GET/MGET、TTL、写失效、迁移绕过、stats 场景都有可观察证据"
    status: done
  - action: "二期配置与上线地址接入：新增广播开关、timeout、queue size 和 proxy 持有 dashboard/topom admin 地址的运行态入口"
    exit_signal: "默认关闭时行为与一期一致；通过 dashboard/coordinator 上线的 proxy 能拿到 topom admin 地址；--fillslots 模式广播不可用但不报错"
    status: done
  - action: "proxy 本地远端失效 API：让目标 proxy admin API 接收 binary-safe DB+keys 并执行幂等本地删除"
    exit_signal: "目标 proxy 收到 remote invalidation 后，仅当本地已缓存该 DB+key 时删除 entry；未启用 cache、未配置 key、entry 不存在均返回成功"
    status: done
  - action: "dashboard/topom fan-out 编排：新增 source proxy 上报 API，由 dashboard/topom 排除 source 后锁外通知其余 online proxy"
    exit_signal: "两个以上 proxy 注册时，source 上报一个 hot key 写事件后，其余 proxy 的同 DB+key cache 被删除；某个目标 proxy 失败时返回摘要和日志，不影响其他 proxy；fan-out 网络 IO 不持有 topom 全局锁"
    status: done
  - action: "写后广播触发与统计：把可枚举 key 的写后本地失效事件接入 source proxy 有界合并 reporter，并补齐广播 attempts/failures/dropped/coalesced/remote invalidations 统计"
    exit_signal: "SET/MSET/DEL/EXPIRE/PERSIST 等写命令成功响应后进入异步广播队列；后端写失败、broadcast disabled、topom 地址未知、队列满、脚本/未知 may-write 不影响 Redis 写响应"
    status: done
  - action: "跨 proxy 验证覆盖与文档边界：补齐 proxy/topom 单测或集成式 fake admin API 测试，并更新用户文档"
    exit_signal: "本地失效、远端失效、dashboard fan-out、失败降级、默认关闭和 --fillslots 退化场景都有可观察证据；文档明确 admin 指 dashboard/topom 管理面而不是 codis-admin CLI"
    status: done

checks:
  - item: "默认关闭时不改变 GET/MGET 的 backend 请求数量和响应"
    source: 范围守护
    status: passed
  - item: "只缓存配置 allowlist 中的 exact key"
    source: 名词契约
    status: passed
  - item: "cache entry 以 database + raw key bytes 区分，并保存 copied bulk bytes、slot id、expire unix nano"
    source: 名词契约
    status: passed
  - item: "GET hot 首次 miss 访问 backend，后续 TTL 内 hit 不访问 backend"
    source: 验收场景
    status: passed
  - item: "MGET 混合 hit/miss 时保持响应数组顺序，backend 只收到 miss 或不可缓存 key"
    source: 验收场景
    status: passed
  - item: "nil bulk、Redis error、超出 max value size 的响应不写入 cache"
    source: 验收场景
    status: passed
  - item: "SET/MSET/DEL/EXPIRE/PERSIST 等同 proxy 写请求使本地 hot key cache 失效"
    source: 流程级约束
    status: passed
  - item: "EVAL/EVALSHA/未知 may-write 命令在 cache 开启时保守清理当前 DB cache"
    source: 流程级约束
    status: passed
  - item: "slot migrating/locked 或 FillSlot 更新后不从旧 cache 返回"
    source: 流程级约束
    status: passed
  - item: "cache entries、value size、TTL 和淘汰策略受配置约束"
    source: 流程级约束
    status: passed
  - item: "proxy stats JSON 暴露 hot key cache enabled、entries、hits、misses、stores、invalidations、evictions"
    source: 验收场景
    status: passed
  - item: "不新增 dashboard/FE 管理页面"
    source: 范围守护
    status: passed
  - item: "不新增 coordinator schema 或 models.Store hot key cache 元数据"
    source: 范围守护
    status: passed
  - item: "不实现自动 per-key QPS 统计和热点晋升逻辑"
    source: 范围守护
    status: passed
  - item: "不缓存 hash/list/set/zset/stream/module value"
    source: 范围守护
    status: passed
  - item: "不为 GETRANGE/GETBIT/STRLEN 等派生读命令增加 cache hit 成功路径"
    source: 范围守护
    status: passed
  - item: "不新增 proxy-to-proxy 直接通信、pubsub、gossip 或 coordinator 持久化广播队列"
    source: 范围守护
    status: passed
  - item: "广播由 source proxy -> dashboard/topom -> other proxy admin API 编排，不经过 codis-admin CLI"
    source: 编排骨架
    status: passed
  - item: "广播 payload 只包含 source proxy token、database、binary-safe keys_base64 和 timeout 元数据，不携带或保存 Redis value"
    source: 名词契约
    status: passed
  - item: "非 UTF-8 Redis key 通过广播链路后仍按原始 bytes 失效，不被 JSON string 改写"
    source: 名词契约
    status: passed
  - item: "target proxy 收到 remote invalidation 后只检查本地 allowlist 并删除 DB+key entry，不主动访问 backend Redis"
    source: 名词契约
    status: passed
  - item: "broadcast disabled、topom 地址未知或 --fillslots 模式下行为退化为一期本地失效 + TTL 收敛"
    source: 验收场景
    status: passed
  - item: "dashboard/topom fan-out 排除 source proxy，并对其他 online proxy 并发通知；单个目标失败不影响其他目标"
    source: 编排骨架
    status: passed
  - item: "dashboard/topom 锁内只校验 source 和复制 proxy registry 快照，锁外执行 fan-out，并对请求 timeout 做保守归一化"
    source: 编排骨架
    status: passed
  - item: "source proxy 上报 dashboard/topom 失败或目标 proxy 超时不能改变成功写命令的客户端响应"
    source: 流程级约束
    status: passed
  - item: "source proxy 广播使用有界队列，短窗口合并重复 DB+key，队列满时丢弃事件并计数"
    source: 流程级约束
    status: passed
  - item: "source proxy 合并后的 broadcast keys 仍按单次 max keys 上限二次分片，不让 coalesce 绕开 topom/proxy 校验"
    source: 流程级约束
    status: passed
  - item: "后端写失败、EVAL/EVALSHA/未知 may-write 的保守 DB 清理不触发精确 key 跨 proxy 广播"
    source: 流程级约束
    status: passed
  - item: "proxy stats JSON 或 dashboard/topom fan-out 摘要提供 broadcast attempts/failures/dropped/coalesced/remote invalidations 的可观测证据"
    source: 验收场景
    status: passed
