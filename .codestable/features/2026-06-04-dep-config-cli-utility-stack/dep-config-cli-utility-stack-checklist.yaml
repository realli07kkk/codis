    exit_signal: "五个升级目标与 design 一致；ugorji/go 仍为 v1.2.14；如变化则记录实际结果并暂停确认"
    status: done
  - action: "依赖触达和策略分类：执行 go mod why -m 并复核 import surface"
    exit_signal: "toml、docopt-go、uuid、gods、bpool 被默认构建路径触达；ugorji/go 仍不被主 module 需要，走 retain-with-note"
    status: done
  - action: "module manifest 定点升级：执行五个 module 的定点 go get"
    exit_signal: "go.mod 只把 toml、docopt-go、uuid、gods、bpool 改到目标版本；ugorji/go v1.2.14、go 1.26.1 和 jemalloc-go replace 保留"
    status: done
  - action: "checksum 与依赖图收口：核对 go.sum 和 module graph"
    exit_signal: "go.sum 只新增五个目标版本的 checksum；没有无关 module 大量 churn；bpool 仍来自 martini-contrib/render 链路"
    status: done
  - action: "默认构建测试闭环：运行默认 cmd/pkg 测试"
    exit_signal: "go test ./cmd/... ./pkg/... 通过，不报 module version、vendor mode 或 API 不兼容错误"
    status: done
  - action: "范围守护与临时产物清理：核对最终 diff 和仓库状态"
    exit_signal: "diff 仅包含 go.mod、go.sum、本 feature spec 和 roadmap item 状态；不出现 vendor/Godeps、配置模板、部署脚本、前端资源或仓库内临时构建产物"
    status: done

