feature: 2026-06-05-dep-zookeeper-module-path-migration
created: 2026-06-05

steps:
  - action: "版本调查复核：重新执行 go list 查询 github.com/go-zookeeper/zk 的 latest 和 versions，并核对 GitHub release/tag"
    exit_signal: "目标仍是正式 tag v1.0.4；不是 pseudo version；module path 为 github.com/go-zookeeper/zk"
    status: done
  - action: "依赖触达和 import surface 复核：执行 go mod why、go list -deps 和旧 path rg 搜索"
    exit_signal: "旧 path 经 pkg/models/zk -> github.com/samuel/go-zookeeper/zk 被默认 cmd/pkg 路径触达，真实 Go import surface 只有 pkg/models/zk/zkclient.go"
    status: done
  - action: "SDK import path 迁移：把 pkg/models/zk/zkclient.go import 替换为 github.com/go-zookeeper/zk"
    exit_signal: "源代码不再 import github.com/samuel/go-zookeeper/zk；package name 仍是 zk；无函数语义改动"
    status: done
  - action: "module manifest 定点迁移：执行目标版本的定点 module 更新，并删除旧 direct require"
    exit_signal: "go.mod direct require 为 github.com/go-zookeeper/zk v1.0.4；github.com/samuel/go-zookeeper 不再出现在 go.mod；go 1.26.1 和 jemalloc-go replace 保留"
    status: done
  - action: "checksum 与依赖图收口：核对 go.sum、module graph 和旧 path 反向 grep"
    exit_signal: "go.sum 只出现新 SDK 必要 checksum 和旧 SDK 未引用 checksum 清理；没有无关 module churn；go list -deps 触达 github.com/go-zookeeper/zk 且不触达旧 path"
    status: done
  - action: "public API 迁移说明与 compile guard：补充 Client.Do breaking API 迁移文档，并增加外部包风格的 compile guard"
    exit_signal: "文档明确旧 samuel 回调签名需要迁到 go-zookeeper；compile guard 证明 Client.Do 接受 func(*github.com/go-zookeeper/zk.Conn) error"
    status: done
  - action: "coordinator target 测试：运行 go test ./pkg/models/zk ./pkg/models ./cmd/internal/coordinator ./cmd/dashboard ./cmd/proxy ./cmd/admin ./cmd/fe"
    exit_signal: "Zookeeper client 包、models 工厂、coordinator 参数解析和相关 cmd 入口均编译测试通过"
    status: done
  - action: "默认构建测试闭环：运行 go test ./cmd/... ./pkg/..."
    exit_signal: "默认 cmd/pkg 测试通过，不报 module version、vendor mode 或 API 不兼容错误"
    status: done
  - action: "范围守护与临时产物清理：核对最终 diff、旧 path 搜索、vendor/Godeps 和临时产物"
    exit_signal: "diff 只包含 go.mod、go.sum、pkg/models/zk/zkclient.go、public API 迁移文档、compile guard 和本 feature spec；无配置、部署、extern、Docker、前端、vendor/Godeps 或无关 module churn"
    status: done

