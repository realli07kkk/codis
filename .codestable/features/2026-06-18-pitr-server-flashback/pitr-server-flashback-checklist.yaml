  - item: "pkg/topom/topom_api.go 三件套：server 路由组 /api/topom/pitr/:xauth（create/get/cancel）+ handler + ApiClient 客户端方法 CreatePitr/GetPitrJobs/CancelPitr（cmd/admin/pitr.go 经此客户端方法调 dashboard，不直连）"
    source: 挂载点
    status: passed
  - item: "cmd/fe/assets/pitr.js + index.html 新增 PITR 区域（FE 入口）"
    source: 挂载点
