feature: 2026-05-12-jemalloc-module-build
created: 2026-05-12

steps:
  - action: "依赖来源骨架：建立 build-ready 的本地 jemalloc-go module source"
    exit_signal: "go list -m -json github.com/spinlock/jemalloc-go 显示 Replace.Dir 指向 third_party/jemalloc-go，且不指向 vendor"
    status: done
  - action: "模块契约接通：在 go.mod 中接入 require / replace，保持 go 1.13 临时 directive 不变"
    exit_signal: "GO111MODULE=on go list -tags cgo_jemalloc -deps ./cmd/proxy 不再停在找不到 github.com/spinlock/jemalloc-go"
    status: done
  - action: "allocator 包验证：让 pkg/utils/unsafe2 在 cgo_jemalloc tag 下完成编译测试"
    exit_signal: "GO111MODULE=on go test -tags cgo_jemalloc ./pkg/utils/unsafe2 通过"
    status: done
  - action: "proxy 构建闭环：用 module mode 构建 codis-proxy"
    exit_signal: "GO111MODULE=on go build -tags cgo_jemalloc -o /tmp/codis-proxy-cgo-test ./cmd/proxy 通过"
    status: done
  - action: "范围回归：确认默认构建标签的 module mode 测试仍成立，并核对范围守护"
    exit_signal: "GO111MODULE=on go test ./cmd/... ./pkg/... 通过，diff 不删除 vendor / Godeps，不生成 vendor/modules.txt"
    status: done

